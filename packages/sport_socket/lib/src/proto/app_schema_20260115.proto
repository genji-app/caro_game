syntax = "proto3";

package app.proto;

option java_package = "com.stech.common.fo.proto.app";
option java_multiple_files = true;
option java_outer_classname = "AppProto";


/*
 * ====================
 * Binary Payload
 * ====================
 */
message Payload {
  string channel = 1;
  string type = 2;
  int32 time_range = 3;
  oneof data {
    LeagueResponse league = 4;
    EventResponse event = 5;
    HotEventsResponse hot_event = 6;
    OutrightEventResponse outright = 7;
    BetSlipStatusResponse bet_slip_status = 8;
  }
}

/*
 * ====================
 * LeagueResponse
 * ====================
 */
message LeagueResponse {
  repeated EventResponse events = 1;

  int32 sport_id = 2;
  string sport_name = 3;

  int32 league_id = 4;
  string league_name = 5;
  string league_name_en = 6;
  string league_logo = 7;

  int32 league_order = 8;
  int32 league_priority_order = 9;

  int32 type = 10;
  bool is_parlay = 11;
  bool is_cash_out = 12;
  bool is_pin = 13;

  string sport_type = 14;
  int32 sport_type_id = 15;
}

/*
 * ====================
 * EventResponse
 * ====================
 */
message EventResponse {
  repeated EventResponse children = 1;
  repeated MarketResponse markets = 2;
  int32 sport_id = 3;
  int32 league_id = 4;
  int64 event_id = 5;
  string start_date = 6;
  int64 start_time = 7;
  bool is_suspended = 8;
  bool is_hidden = 9;
  bool is_parlay = 10;
  bool is_cash_out = 11;
  int32 type = 12;
  int32 pin_type = 13;
  string special_situation = 14;
  int64 event_stats_id = 15;
  int32 sport_type_id = 16;
  string sport_type_name = 17;
  int32 home_id = 18;
  int32 away_id = 19;
  string home_name = 20;
  string away_name = 21;
  string home_logo = 22;
  string away_logo = 23;
  int32 market_count = 24;
  repeated int32 market_groups = 25;
  repeated int32 time_market_groups = 26;
  bool is_hot = 27;
  bool is_going_live = 28;
  bool is_live = 29;
  bool is_live_stream = 30;
  int32 game_part = 31;
  int32 game_time = 32;
  int32 stoppage_time = 33;
  ScoreResponse live_score = 34;
  int32 child_type = 35;
}

message ScoreResponse {
  oneof data {
    SoccerScoreResponse soccer = 1;
    BasketballScoreResponse basketball = 2;
    VolleyballScoreResponse volleyball = 3;
    TennisScoreResponse tennis = 4;
    TableTennisScoreResponse table_tennis = 5;
    BadmintonScoreResponse badminton = 6;
  }
}

message SoccerScoreResponse {
  int32 home_score = 1;
  int32 away_score = 2;
  int32 home_score_h2 = 3;
  int32 away_score_h2 = 4;
  int32 home_corner = 5;
  int32 away_corner = 6;
  int32 home_score_o_t = 7;
  int32 away_score_o_t = 8;
  int32 home_score_pen = 9;
  int32 away_score_pen = 10;
  int32 yellow_cards_home = 11;
  int32 yellow_cards_away = 12;
  int32 red_cards_home = 13;
  int32 red_cards_away = 14;
}

message LiveScore {
  string home_score = 1;
  string away_score = 2;
}

message BasketballScoreResponse {
  repeated LiveScore live_scores = 1;
  int32 home_score_f_t = 2;
  int32 away_score_f_t = 3;
  int32 home_score_o_t = 4;
  int32 away_score_o_t = 5;
}

message VolleyballScoreResponse {
  repeated LiveScore live_scores = 1;
  int32 home_set_score = 2;
  int32 away_set_score = 3;
  int32 home_total_point = 4;
  int32 away_total_point = 5;
  string serving_side = 6;
  int32 current_set = 7;
  string num_of_sets = 8;
}

message TennisScoreResponse {
  repeated LiveScore live_scores = 1;
  int32 home_set_score = 2;
  int32 away_set_score = 3;
  int32 home_game_score = 4;
  int32 away_game_score = 5;
  string home_current_point = 6;
  string away_current_point = 7;
  string serving_side = 8;
  int32 current_set = 9;
  string num_of_sets = 10;
}

message TableTennisScoreResponse {
  repeated LiveScore live_scores = 1;
  int32 home_set_score = 2;
  int32 away_set_score = 3;
  int32 home_total_point = 4;
  int32 away_total_point = 5;
  string serving_side = 6;
  int32 current_set = 7;
  string num_of_sets = 8;
}

message BadmintonScoreResponse {
  repeated LiveScore live_scores = 1;
  int32 home_set_score = 2;
  int32 away_set_score = 3;
  int32 home_total_point = 4;
  int32 away_total_point = 5;
  string serving_side = 6;
  int32 current_set = 7;
  string num_of_sets = 8;
}

/*
 * ====================
 * MarketResponse
 * ====================
 */
message MarketResponse {
  repeated OddsResponse oddsList = 1;

  int32 sport_id = 2;
  int32 league_id = 3;
  int64 event_id = 4;
  int32 market_id = 5;

  bool is_suspended = 6;
  bool is_parlay = 7;
  bool is_cash_out = 8;
  int32 promotion_type = 9;
  int32 group_id = 10;
}

/*
 * ====================
 * OddsResponse
 * ====================
 */
message OddsResponse {
  string selection_home_id = 1;
  string selection_away_id = 2;
  string selection_draw_id = 3;
  string points = 4;

  OddsStyleResponse odds_home = 5;
  OddsStyleResponse odds_away = 6;
  OddsStyleResponse odds_draw = 7;

  string str_offer_id = 8;
  bool is_main_line = 9;
  bool is_suspended = 10;
  bool is_hidden = 11;
}

/*
 * ====================
 * OddsStyleResponse
 * ====================
 */
message OddsStyleResponse {
  string decimal = 1;
  string malay = 2;
  string indo = 3;
  string hk = 4;
}

/*
 * ====================
 * OutrightOddsResponse
 * ====================
 */
message OutrightOddsResponse {
  string selection_id = 1;
  string selection_name = 2;
  string selection_logo = 3;
  string offer_id = 4;
  double odds = 5;
  string cls = 6;
  bool is_suspended = 7;
}

/*
 * ====================
 * OutrightEventResponse
 * ====================
 */
message OutrightEventResponse {
  repeated OutrightOddsResponse odds_list = 1;
  int64 event_id = 2;
  string event_name = 3;
  bool is_suspended = 4;
  string end_date = 5;
  int64 end_time = 6;
  int32 league_id = 7;
  string league_logo = 8;
  string league_name = 9;
  string league_name_en = 10;
  int32 league_order = 11;
  int32 league_priority_order = 12;
  int32 sport_id = 13;
}

/*
 * ====================
 * BetSlipStatusResponse
 * ====================
 */
message BetSlipStatusResponse {
  string ticket_id = 1;
  string status = 2;
}

/*
 * ====================
 * HotEventsResponse
 * ====================
 */
message HotEventsResponse {
  repeated HotEventResponse events = 1;
}

/*
 * ====================
 * HotEventResponse
 * ====================
 */
message HotEventResponse {
  EventResponse event = 1;
  int32 league_id = 2;
  string league_name = 3;
  int32 league_order = 4;
  int32 league_priority_order = 5;
  string league_logo = 6;
}