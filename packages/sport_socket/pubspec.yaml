name: sport_socket
description: High-performance Pure Dart WebSocket library for real-time sports betting data. Handles 9999+ msg/s with <300ms latency.
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  web_socket_channel: ^3.0.0
  collection: ^1.18.0
  meta: ^1.11.0
  protobuf: ^6.0.0
  fixnum: ^1.1.0

dev_dependencies:
  test: ^1.24.0
  lints: ^3.0.0
