include: package:flutter_lints/flutter.yaml

formatter:
  page_width: 100

linter:
  rules:
    public_member_api_docs: true
    always_use_package_imports: ignore
    document_ignores: ignore
    lines_longer_than_80_chars: ignore

analyzer:
  errors:
    always_use_package_imports: ignore
    document_ignores: ignore
    lines_longer_than_80_chars: ignore
