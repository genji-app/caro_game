dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.3
  build_runner: ^2.10.1
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  flutter_gen_runner: ^5.12.0
  isolate_manager_generator: ^0.3.0

# path_provider_foundation 2.6+ bundles package:objective_c (native_assets). A bad
# device/simulator cache mix can produce an arm64 slice marked IOSSIMULATOR and
# App Store rejects the IPA (code 91169). 2.4.x uses classic federated iOS code
# without that framework — safe for store until upstream fixes are verified.
dependency_overrides:
  path_provider_foundation: 2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1A1A3E"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  remove_alpha_channel_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
    - shorebird.yaml
