name: co_caro_flame
description: Cờ Caro game using Flutter Flame engine - Full Featured
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  package_info_plus: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# path_provider_foundation 2.6+ bundles package:objective_c (native_assets). A bad
# device/simulator cache mix can produce an arm64 slice marked IOSSIMULATOR and
# App Store rejects the IPA (code 91169). 2.4.x uses classic federated iOS code
# without that framework — safe for store until upstream fixes are verified.
dependency_overrides:
  path_provider_foundation: 2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1A1A3E"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  remove_alpha_channel_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
